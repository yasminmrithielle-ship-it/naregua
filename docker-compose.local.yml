services:
  postgres:
    image: postgres:16-alpine
    container_name: barbergo-postgres-local
    environment:
      POSTGRES_DB: barbergo
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - barbergo_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d barbergo"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  barbergo_postgres_data:
