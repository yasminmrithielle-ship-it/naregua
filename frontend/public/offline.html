<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Barber Go</title>
    <meta name="theme-color" content="#1f2937" />
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background: radial-gradient(circle at top left, #ffffff 0%, #f6f2ea 45%, #d9e3dd 100%);
        font-family: "IBM Plex Sans", sans-serif;
        color: #1f2937;
      }

      main {
        width: min(100%, 520px);
        border: 1px solid rgba(14, 15, 18, 0.08);
        border-radius: 28px;
        background: rgba(255, 255, 255, 0.78);
        backdrop-filter: blur(24px);
        box-shadow: 0 24px 80px rgba(17, 24, 39, 0.14);
        padding: 32px;
      }

      h1 {
        margin: 0;
        font-size: 32px;
      }

      p {
        margin: 12px 0 0;
        line-height: 1.6;
        color: rgba(31, 41, 55, 0.72);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Sem conexao</h1>
      <p>O Barber Go precisa de internet para atualizar agenda, servicos e assinaturas.</p>
      <p>Assim que a conexao voltar, recarregue a tela para continuar.</p>
    </main>
  </body>
</html>
